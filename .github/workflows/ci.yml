name: REVISOR CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies (LibreOffice for docx conversion)
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice

      - name: Install Python dependencies
        run: |
          cd backend-python
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r ai_engine/requirements.txt
          pip install pytest pytest-asyncio httpx
          # Modelo de español para spaCy
          python -m spacy download es_core_news_sm || true

      - name: Run pytest
        run: |
          cd backend-python
          python -m pytest tests/ -v --tb=short

  frontend-build:
    name: Frontend Next.js Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: thesis-reviewer/package-lock.json

      - name: Install dependencies
        run: |
          cd thesis-reviewer
          npm ci

      - name: Build Next.js
        run: |
          cd thesis-reviewer
          npm run build

      - name: Lint
        run: |
          cd thesis-reviewer
          npm run lint || true

  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-python
          file: ./backend-python/Dockerfile
          push: false
          tags: revisor-api:latest

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: revisor-web:latest

  docs-deploy:
    name: Deploy MkDocs to GitHub Pages
    runs-on: ubuntu-latest
    needs: backend-tests
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs
        run: pip install mkdocs mkdocs-material

      - name: Deploy docs
        run: |
          cd docs-site
          mkdocs gh-deploy --force
